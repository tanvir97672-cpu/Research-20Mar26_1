# Smoke Test Configuration for DAOS-RFF
# OPTIMIZED for Lightning AI L4 GPU (24GB VRAM)
# Uses minimal data (~1% of full dataset) for quick validation

# Data Configuration
data:
  # Dataset settings - using real LoRa RFFI data
  dataset_name: "lora_rffi_real"
  # Download only ~1% of data for smoke test
  smoke_test_fraction: 0.01
  # Number of known devices (closed set)
  num_known_devices: 5
  # Number of unknown devices for open-set testing
  num_unknown_devices: 2
  # Spectrogram parameters
  stft_n_fft: 256
  stft_hop_length: 64
  # Data splits
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  # Number of samples per device - INCREASED for L4
  samples_per_device: 100
  # Number of workers - OPTIMIZED for L4 (8 vCPUs)
  num_workers: 4
  # Pin memory for faster GPU transfer
  pin_memory: true
  # Persistent workers to avoid respawning
  persistent_workers: true
  # Prefetch factor for data loading
  prefetch_factor: 4

# Model Configuration
model:
  # Backbone
  backbone: "resnet18"
  pretrained: false  # No pretrained for smoke test
  feature_dim: 512
  embedding_dim: 128
  # Evidential head
  num_classes: 5  # Must match num_known_devices
  # Adversarial components
  num_channels: 3  # Number of channel conditions
  num_domains: 2   # Source and target domains
  # Loss weights
  lambda_adv_channel: 0.1
  lambda_adv_domain: 0.1
  lambda_contrastive: 0.1
  # Dropout
  dropout_rate: 0.3

# Training Configuration - OPTIMIZED for L4 GPU
training:
  # Epochs for smoke test
  max_epochs: 5
  # BATCH SIZE - L4 can handle much larger batches (24GB VRAM)
  batch_size: 64
  # Learning rate scaled for larger batch
  learning_rate: 0.002
  weight_decay: 0.0001
  # Optimizer
  optimizer: "adamw"
  # Scheduler
  scheduler: "cosine"
  warmup_epochs: 1
  # Gradient clipping for stability
  gradient_clip_val: 1.0
  # PRECISION - bf16-mixed is more stable than 16-mixed on L4
  precision: "bf16-mixed"
  # Checkpointing
  save_top_k: 1
  # Early stopping patience
  patience: 3
  # Enable torch.compile for faster training (PyTorch 2.0+)
  compile_model: true
  # Gradient accumulation (effective batch = batch_size * accumulate)
  accumulate_grad_batches: 1

# Evaluation Configuration
evaluation:
  # Open-set detection threshold
  uncertainty_threshold: 0.5
  # Metrics to compute
  metrics:
    - "auroc"
    - "aupr"
    - "accuracy"
    - "fpr_at_95_tpr"

# Hardware Configuration - Lightning AI L4 GPU
hardware:
  accelerator: "gpu"
  devices: 1
  strategy: "auto"
  # Enable Tensor Cores with TF32
  matmul_precision: "high"
  # Enable cuDNN benchmarking for optimal kernels
  cudnn_benchmark: true

# Logging
logging:
  project_name: "daos_rff_smoke_test"
  log_every_n_steps: 10
  enable_progress_bar: true

# Paths
paths:
  data_dir: "./data/raw"
  processed_dir: "./data/processed"
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"

# Random seed for reproducibility
seed: 42
